<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ocean Background</title>
  <style>
    :root {
      color-scheme: dark;
      --deep-ink: #020812;
      --sea-ink: #02101f;
      --navy: #05223c;
      --soft-cyan: rgba(110, 210, 255, 0.16);
      --pale-cyan: rgba(142, 236, 255, 0.22);
      --light-mist: rgba(255, 255, 255, 0.08);
      --shadow: rgba(0, 7, 20, 0.42);
      --glow: rgba(137, 225, 255, 0.18);
      --spark: rgba(235, 255, 255, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(16, 67, 115, 0.3), transparent 24%),
                  linear-gradient(180deg, #041327 0%, #02060f 28%, #01040a 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      position: relative;
      color: white;
    }

    .ocean-scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: radial-gradient(circle at top center, rgba(16, 58, 100, 0.12), transparent 35%),
                  linear-gradient(180deg, rgba(3, 25, 56, 0.45), rgba(1, 4, 10, 0.96) 75%);
      transform-style: preserve-3d;
      perspective: 1200px;
    }

    .ray-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at top center, rgba(255,255,255,0.05) 0%, transparent 30%),
        linear-gradient(180deg, rgba(132, 216, 255, 0.22), transparent 45%, rgba(0,0,0,0.28) 100%);
      mask-image: linear-gradient(180deg, rgba(255,255,255,1) 0%, transparent 52%);
    }

    .ray-layer::before,
    .ray-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      opacity: 0.24;
      filter: blur(16px);
      mix-blend-mode: screen;
    }

    .ray-layer::before {
      background-image: linear-gradient(90deg, rgba(255,255,255,0.12) 0%, transparent 28%, rgba(255,255,255,0.08) 52%, transparent 76%, rgba(255,255,255,0.12) 100%);
      background-size: 120% 220%;
      transform: translateX(-18%) skewX(-12deg);
      animation: rayShift 24s linear infinite;
    }

    .ray-layer::after {
      background-image: linear-gradient(90deg, transparent 18%, rgba(255,255,255,0.08) 26%, rgba(255,255,255,0.02) 34%, transparent 60%),
                        radial-gradient(circle at top center, rgba(255,255,255,0.16), transparent 36%);
      background-size: 260% 260%;
      transform: translateX(10%) skewX(12deg);
      animation: rayShift 28s reverse infinite;
    }

    .particle-layer,
    .bubble-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle-layer {
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(168, 235, 255, 0.7);
      filter: blur(1px);
      opacity: 0.65;
      animation: twinkle 12s infinite ease-in-out;
    }

    .bubble-layer {
      z-index: 2;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.9), rgba(227, 255, 255, 0.18) 22%, rgba(13, 49, 83, 0.15) 62%, transparent 100%);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.28), 0 8px 22px rgba(0, 18, 36, 0.18);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(225, 255, 255, 0.18);
      opacity: 0.75;
      transform: translate3d(0, 0, 0);
      will-change: transform, opacity;
    }

    .bubble::after {
      content: "";
      position: absolute;
      top: 16%;
      left: 16%;
      width: 24%;
      height: 24%;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      filter: blur(1px);
      opacity: 0.9;
    }

    .foreground-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 12%, rgba(138, 216, 255, 0.16), transparent 28%),
                  radial-gradient(circle at 20% 80%, rgba(25, 115, 170, 0.12), transparent 18%),
                  radial-gradient(circle at 85% 82%, rgba(30, 82, 130, 0.18), transparent 22%);
      mix-blend-mode: screen;
      z-index: 4;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.42) 100%);
      pointer-events: none;
      z-index: 5;
    }

    .message-bottle-wrap {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      z-index: 7;
      display: grid;
      place-items: center;
      pointer-events: auto;
    }

    .message-bottle {
      position: relative;
      width: clamp(112px, 12.5vw, 162px);
      height: clamp(198px, 27vw, 292px);
      border: 0;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      padding: 0;
      transform: rotate(-9deg);
      animation: bottle-float 4.6s ease-in-out infinite;
      filter: drop-shadow(0 14px 24px rgba(2, 12, 24, 0.42));
    }

    .message-bottle:focus-visible {
      outline: 2px solid rgba(198, 239, 255, 0.9);
      outline-offset: 6px;
      border-radius: 14px;
    }

    .bottle-glass {
      position: absolute;
      inset: 14% 10% 6% 10%;
      border-radius: 46% 46% 30% 30% / 34% 34% 64% 64%;
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,0.88), rgba(255,255,255,0.08) 24%, rgba(156, 223, 255, 0.34) 60%, rgba(74, 126, 170, 0.18) 100%),
        linear-gradient(165deg, rgba(170, 235, 255, 0.54), rgba(116, 187, 223, 0.26));
      border: 1px solid rgba(219, 245, 255, 0.5);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.2), inset 0 -16px 20px rgba(24, 80, 122, 0.24);
      overflow: hidden;
    }

    .bottle-glass::before {
      content: "";
      position: absolute;
      left: 14%;
      top: 8%;
      width: 18%;
      height: 46%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.52), rgba(255,255,255,0));
      filter: blur(0.2px);
      opacity: 0.9;
    }

    .bottle-glass::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4%;
      width: 52%;
      height: 13%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(16, 66, 100, 0.34), rgba(16, 66, 100, 0.08) 64%, rgba(16, 66, 100, 0) 100%);
      pointer-events: none;
    }

    .bottle-neck {
      position: absolute;
      left: 50%;
      top: 5.5%;
      width: 27%;
      height: 22%;
      transform: translateX(-50%);
      border-radius: 30% 30% 44% 44% / 14% 14% 86% 86%;
      background: linear-gradient(180deg, rgba(188, 241, 255, 0.64), rgba(108, 176, 213, 0.24));
      border: 1px solid rgba(215, 245, 255, 0.5);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.18), inset 0 -8px 10px rgba(76, 134, 176, 0.14);
      z-index: 2;
    }

    .bottle-neck::before {
      content: "";
      position: absolute;
      left: -34%;
      right: -34%;
      bottom: -12%;
      height: 34%;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(186, 236, 255, 0.5), rgba(112, 171, 206, 0.32) 68%, rgba(112, 171, 206, 0.1) 100%);
      border: 1px solid rgba(201, 238, 255, 0.42);
    }

    .bottle-neck::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -8%;
      width: 74%;
      height: 18%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(203, 243, 255, 0.6), rgba(122, 182, 217, 0.28) 72%, rgba(122, 182, 217, 0.08) 100%);
      border: 1px solid rgba(212, 244, 255, 0.5);
    }

    .bottle-cork {
      position: absolute;
      left: 50%;
      top: 2.6%;
      width: 19%;
      height: 9.5%;
      transform: translateX(-50%);
      border-radius: 28% 28% 22% 22% / 34% 34% 18% 18%;
      background:
        repeating-linear-gradient(90deg, rgba(168, 128, 86, 0.92) 0 2px, rgba(148, 110, 73, 0.9) 2px 5px),
        linear-gradient(180deg, #c19769 0%, #a57a52 44%, #7d5a3a 100%);
      border: 1px solid rgba(55, 37, 24, 0.44);
      box-shadow: inset 0 -4px 5px rgba(62, 42, 26, 0.3), inset 0 2px 2px rgba(255, 222, 181, 0.2);
      z-index: 3;
    }

    .bottle-cork::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -22%;
      width: 82%;
      height: 32%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(205, 166, 118, 0.92), rgba(146, 108, 71, 0.72) 78%, rgba(102, 72, 46, 0.5) 100%);
      border: 1px solid rgba(73, 48, 29, 0.42);
    }

    .bottle-scroll {
      position: absolute;
      left: 50%;
      top: 57%;
      width: 28%;
      height: 56%;
      transform: translate(-50%, -50%) rotate(8deg);
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 245, 216, 0.56), rgba(255, 245, 216, 0) 34%),
        radial-gradient(circle at 82% 78%, rgba(173, 130, 80, 0.28), rgba(173, 130, 80, 0) 44%),
        repeating-linear-gradient(0deg, rgba(138, 100, 58, 0.08) 0 2px, rgba(138, 100, 58, 0) 2px 6px),
        repeating-linear-gradient(90deg, rgba(118, 86, 52, 0.05) 0 1px, rgba(118, 86, 52, 0) 1px 5px),
        linear-gradient(180deg, #f7e8c8, #e8d0a5 52%, #ddc091 100%);
      border: 1px solid rgba(158, 117, 71, 0.52);
      box-shadow: 0 2px 8px rgba(20, 16, 10, 0.28), inset 0 0 0 1px rgba(255, 241, 208, 0.35);
      opacity: 0.95;
      transform-origin: 50% 50%;
    }

    .bottle-scroll::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -12%;
      width: 72%;
      height: 19%;
      transform: translateX(-50%) rotate(-4deg);
      border-radius: 48% 52% 54% 46% / 52% 48% 56% 44%;
      background:
        radial-gradient(circle at 56% 60%, rgba(252, 238, 205, 0.98) 0%, rgba(238, 214, 168, 0.94) 56%, rgba(180, 132, 78, 0.62) 86%, rgba(160, 116, 68, 0.24) 100%),
        radial-gradient(circle at 44% 54%, rgba(214, 165, 108, 0.28), rgba(214, 165, 108, 0) 70%);
      border: 1px solid rgba(158, 117, 71, 0.46);
      box-shadow: inset 0 0 0 1px rgba(247, 231, 198, 0.34);
    }

    .bottle-scroll::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -12%;
      width: 74%;
      height: 20%;
      transform: translateX(-50%) rotate(3deg);
      border-radius: 52% 48% 46% 54% / 48% 52% 44% 56%;
      background:
        radial-gradient(circle at 48% 40%, rgba(252, 238, 205, 0.98) 0%, rgba(238, 214, 168, 0.94) 56%, rgba(180, 132, 78, 0.62) 86%, rgba(160, 116, 68, 0.24) 100%),
        radial-gradient(circle at 54% 46%, rgba(214, 165, 108, 0.28), rgba(214, 165, 108, 0) 70%);
      border: 1px solid rgba(158, 117, 71, 0.46);
      box-shadow: inset 0 0 0 1px rgba(247, 231, 198, 0.34);
    }

    .bottle-pulse {
      position: absolute;
      width: clamp(160px, 19vw, 240px);
      height: clamp(160px, 19vw, 240px);
      border-radius: 50%;
      border: 2px solid rgba(163, 228, 255, 0.4);
      box-shadow: 0 0 0 1px rgba(116, 197, 234, 0.2);
      animation: pulse-ring 2.1s ease-out infinite;
      pointer-events: none;
    }

    .bottle-hint {
      margin-top: 12px;
      font-size: clamp(12px, 1.5vw, 16px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(211, 243, 255, 0.96);
      text-shadow: 0 2px 8px rgba(6, 28, 46, 0.62);
      animation: hint-bob 2.1s ease-in-out infinite;
      pointer-events: none;
      user-select: none;
      font-weight: 700;
    }

    .message-bottle-wrap.clicked .bottle-pulse,
    .message-bottle-wrap.clicked .bottle-hint {
      opacity: 0;
      animation: none;
    }

    @keyframes bottle-float {
      0%,
      100% { transform: rotate(-9deg) translateY(0); }
      50% { transform: rotate(-8deg) translateY(-7px); }
    }

    @keyframes pulse-ring {
      0% {
        opacity: 0.85;
        transform: scale(0.84);
      }
      100% {
        opacity: 0;
        transform: scale(1.35);
      }
    }

    @keyframes hint-bob {
      0%,
      100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .hero-copy {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 24px;
      text-align: center;
    }

    .hero-copy-inner {
      max-width: 680px;
      width: min(100%, 720px);
      padding: 24px 28px;
      border-radius: 28px;
      background: rgba(2, 6, 18, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(24px);
      pointer-events: auto;
    }

    .hero-copy h1 {
      margin: 0;
      color: rgba(250, 250, 255, 0.94);
      font-family: 'Segoe Script', 'Apple Chancery', 'Zapfino', cursive;
      font-size: clamp(2.4rem, 4vw, 5.2rem);
      line-height: 0.98;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      border-right: 0.16em solid rgba(255,255,255,0.72);
      width: 0;
      animation: typing 3.8s steps(30, end) forwards,
                 blink-caret 0.8s step-end infinite;
      margin-bottom: 1.1rem;
    }

    .hero-copy p {
      margin: 0;
      color: rgba(237, 246, 255, 0.78);
      font-size: clamp(0.96rem, 1.1vw, 1.18rem);
      line-height: 1.8;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards 4.2s;
      transform: translateY(8px);
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink-caret {
      50% { border-color: transparent; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes driftRays {
      0%, 100% { transform: translateY(0) scale(1.02); }
      50% { transform: translateY(8%) scale(1.05); }
    }

    @keyframes rayShift {
      0% { background-position: 0 0; }
      100% { background-position: -20% 120%; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.52; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.45); }
    }

    @media (max-width: 900px) {
      .ray-layer::before,
      .ray-layer::after {
        opacity: 0.16;
      }
      .bubble::after {
        top: 18%;
        left: 18%;
        width: 22%;
        height: 22%;
      }
    }

    @media (max-width: 640px) {
      .particle {
        opacity: 0.45;
      }
      .bubble {
        box-shadow: inset 0 0 14px rgba(255,255,255,0.2), 0 4px 12px rgba(0, 12, 24, 0.16);
      }
    }
  </style>
</head>
<body>
  <div class="ocean-scene">
    <div class="ray-layer"></div>
    <div class="particle-layer" id="particleLayer"></div>
    <div class="bubble-layer" id="bubbleLayer"></div>
    <div class="foreground-glow"></div>
    <div class="vignette"></div>
    <div class="message-bottle-wrap" id="messageBottleWrap">
      <button class="message-bottle" id="messageBottle" type="button" aria-label="Open message bottle">
        <span class="bottle-neck"></span>
        <span class="bottle-cork"></span>
        <span class="bottle-glass">
          <span class="bottle-scroll"></span>
        </span>
      </button>
      <span class="bottle-pulse" aria-hidden="true"></span>
      <span class="bottle-hint" id="bottleHint">Click the bottle</span>
    </div>
  </div>

  <script>
    const bubbleCount = 20;
    const particleCount = 40;
    const bubbleLayer = document.getElementById('bubbleLayer');
    const particleLayer = document.getElementById('particleLayer');
    const messageBottleWrap = document.getElementById('messageBottleWrap');
    const messageBottle = document.getElementById('messageBottle');
    const bottleHint = document.getElementById('bottleHint');
    const bubbles = [];
    const particles = [];

    const state = {
      pointerX: 0,
      pointerY: 0,
      targetX: 0,
      targetY: 0,
      lastTime: performance.now(),
    };

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createBubble(depth) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = randomBetween(depth === 1 ? 44 : 26, depth === 1 ? 110 : 68);
      const blur = randomBetween(depth === 1 ? 10 : 4, depth === 1 ? 18 : 9);
      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.filter = `blur(${blur}px)`;
      bubble.style.opacity = `${randomBetween(0.18, 0.58)}`;
      bubble.style.zIndex = depth === 1 ? 2 : 3;

      const bubbleState = {
        element: bubble,
        speed: randomBetween(depth === 1 ? 3.2 : 5.2, depth === 1 ? 7 : 11),
        x: randomBetween(0, 100),
        y: randomBetween(0, 120),
        drift: randomBetween(-0.015, 0.015),
        size,
        depth,
        wave: randomBetween(0, Math.PI * 2),
      };

      bubbleLayer.appendChild(bubble);
      return bubbleState;
    }

    function createParticle() {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = randomBetween(1.5, 4.5);
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${randomBetween(5, 98)}vw`;
      particle.style.top = `${randomBetween(5, 96)}vh`;
      particle.style.opacity = `${randomBetween(0.18, 0.68)}`;
      particle.style.transform = `scale(${randomBetween(0.55, 1.1)})`;

      const particleState = {
        element: particle,
        phase: randomBetween(0, Math.PI * 2),
        amplitude: randomBetween(6, 18),
        baseX: parseFloat(particle.style.left),
        baseY: parseFloat(particle.style.top),
        speed: randomBetween(0.0008, 0.0016),
      };

      particleLayer.appendChild(particle);
      return particleState;
    }

    function initScene() {
      for (let i = 0; i < bubbleCount; i += 1) {
        bubbles.push(createBubble(i % 2 === 0 ? 1 : 2));
      }
      for (let i = 0; i < particleCount; i += 1) {
        particles.push(createParticle());
      }
    }

    function updateScene(now) {
      const dt = Math.min(0.032, (now - state.lastTime) / 1000);
      state.lastTime = now;
      state.pointerX += (state.targetX - state.pointerX) * 0.06;
      state.pointerY += (state.targetY - state.pointerY) * 0.06;

      const parallaxX = state.pointerX * 0.6;
      const parallaxY = state.pointerY * 0.4;

      bubbles.forEach((bubble, index) => {
        bubble.y -= bubble.speed * dt;
        bubble.x += bubble.drift * dt * 24;
        bubble.wave += dt * 1.2;
        if (bubble.y < -22) {
          bubble.y = 118;
          bubble.x = randomBetween(2, 98);
        }
        if (bubble.x < -12) bubble.x = 105;
        if (bubble.x > 110) bubble.x = -10;

        const sway = Math.sin(bubble.wave) * (bubble.depth === 1 ? 2.4 : 3.6);
        const x = bubble.x + sway * 0.6 + parallaxX * (bubble.depth === 1 ? 0.05 : 0.11);
        const y = bubble.y + parallaxY * (bubble.depth === 1 ? 0.05 : 0.1);
        bubble.element.style.transform = `translate3d(${x}vw, ${y}vh, 0) scale(${bubble.depth === 1 ? 1 : 0.95})`;
      });

      particles.forEach((particle) => {
        particle.phase += dt * particle.speed * 260;
        const offsetX = Math.cos(particle.phase) * particle.amplitude * 0.4;
        const offsetY = Math.sin(particle.phase) * particle.amplitude * 0.25;
        particle.element.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0) scale(0.98)`;
      });

      requestAnimationFrame(updateScene);
    }

    function handlePointer(event) {
      const x = event.clientX / window.innerWidth;
      const y = event.clientY / window.innerHeight;
      state.targetX = (x - 0.5) * 26;
      state.targetY = (y - 0.5) * 18;
    }

    function handleTouch(event) {
      if (!event.touches.length) return;
      handlePointer(event.touches[0]);
    }

    window.addEventListener('pointermove', handlePointer);
    window.addEventListener('touchmove', handleTouch, { passive: true });
    window.addEventListener('resize', () => {
      bubbles.forEach((bubble) => {
        bubble.x = Math.min(100, Math.max(0, bubble.x));
        bubble.y = Math.min(100, Math.max(0, bubble.y));
      });
    });

    if (messageBottle) {
      let bottleOpened = false;

      const activateBottle = () => {
        if (bottleOpened) return;
        bottleOpened = true;
        if (messageBottleWrap) {
          messageBottleWrap.classList.add('clicked');
        }
        if (bottleHint) {
          bottleHint.textContent = 'Nice find';
        }
      };

      messageBottle.addEventListener('click', activateBottle);
      messageBottle.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          activateBottle();
        }
      });
    }

    initScene();
    requestAnimationFrame(updateScene);
  </script>
</body>
</html>
